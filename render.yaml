services:
  - type: web
    name: canasta-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: canasta-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: canasta-db
    plan: free
    region: frankfurt
